name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          name="undo-${{ matrix.target }}"
          staging="$name"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/undo" "$staging/"
          cp README.md LICENSE "$staging/"
          cp -r shell "$staging/"
          mkdir -p "$staging/doc"
          cp doc/undo.1 "$staging/doc/"
          tar -czf "$name.tar.gz" "$staging"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            undo-${{ matrix.target }}.tar.gz
            undo-${{ matrix.target }}.tar.gz.sha256
